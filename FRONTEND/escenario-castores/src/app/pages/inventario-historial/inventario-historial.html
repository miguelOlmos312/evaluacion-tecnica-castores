<div class="tablaMovimientos">
    <h1>INVENTARIO HISTORIAL</h1>


    <div class="filtroMovimiento">
        <label class="labelTipoMovimiento">Tipo de movimiento:</label>
        <select class="form-select" (change)="seleccionTipoDeMovimiento($event)">
            <option value="1">Entrada</option>
            <option value="2">Salida</option>
        </select>

    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>No. Movimiento</th>
                <th>Tipo de Movimiento</th>
                <th>Producto</th>
                <th>Usuario</th>
                <th>Fecha</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let item of movimientos">
                <td>{{item.id_movimiento}}</td>
                <td>{{item.tipoMovimiento.nombre}}</td>
                <td>{{item.producto.nombre}}</td>
                <td>{{item.usuario.nombre}}</td>
                <td>{{ item.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
            </tr>
        </tbody>

    </table>
</div>
